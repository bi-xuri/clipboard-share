<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LAN Clipboard Web</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="mobile-optimized">
    <main class="app">
      <section class="card">
        <div class="hero">
          <div>
            <p class="eyebrow">LAN clipboard</p>
            <h1>Shared Clipboard</h1>
            <p class="subhead">Instant clipboard sync across your local network, with automatic fallback when one route fails.</p>
          </div>
          <p id="connectionStatus" class="status-pill" data-state="connecting">Initializing…</p>
        </div>

        <div class="server-config">
          <label for="serverHost">Preferred Server</label>
          <div class="input-shell">
            <span class="input-prefix">LAN</span>
            <input id="serverHost" type="text" spellcheck="false" autocomplete="off" placeholder="Type a hostname, IP, or ws:// URL">
            <button id="saveServerButton" type="button" class="secondary">Auto</button>
          </div>
          <p class="hint">Type any valid host and the app connects immediately. Leave it blank to stay on zero-touch discovery.</p>
        </div>

        <div class="clipboard-panel">
          <div class="panel-head">
            <label for="clipboardText">Current text</label>
            <p id="updatedAt" class="timestamp"></p>
          </div>
          <textarea id="clipboardText" rows="10" placeholder="Shared clipboard text"></textarea>
        </div>

        <div class="actions">
          <button id="pushButton" type="button" class="primary">Share to LAN</button>
          <button id="copyButton" type="button" class="secondary">Copy Local</button>
        </div>
      </section>
    </main>
    <script src="discovery.js"></script>
    <script src="app.js"></script>
  </body>
</html>
