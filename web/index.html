<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipboard Share</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app">
      <header>
        <h1 class="title">Clipboard Share</h1>
        <p id="connectionStatus" data-state="idle">Initializing...</p>
      </header>

      <main>
        <section class="card clipboard-panel">
          <div class="panel-head">
            <h2>Shared Clipboard</h2>
            <span id="updatedAt"></span>
          </div>

          <div class="input-shell">
            <textarea id="clipboardText" placeholder="Type something to share..."></textarea>
            <div class="actions">
              <button id="pushButton" type="button">Share to LAN</button>
              <button id="copyButton" type="button" class="secondary">Copy Local</button>
            </div>
          </div>
        </section>

        <section class="card file-panel">
          <div class="panel-head">
            <h2>Shared Files</h2>
          </div>

          <div id="dropZone" class="drop-zone">
            <p>Drag &amp; drop files here or</p>
            <button id="fileInputBtn" type="button" class="secondary">Select Files</button>
            <input type="file" id="fileInput" multiple hidden>
          </div>

          <ul id="fileList" class="file-list"></ul>
        </section>
      </main>

      <footer>
        <div class="server-config">
          <label for="serverHost">Server Host (IP or URL):</label>
          <div class="input-shell">
            <input type="text" id="serverHost" placeholder="e.g., 192.168.1.50:8080">
            <button id="saveServerButton" type="button" class="secondary">Auto Discovery</button>
          </div>
          <p id="serverHostStatus"></p>
        </div>
      </footer>
    </div>

    <script src="/discovery.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
